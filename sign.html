<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Sign In — Fee Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080812" media="(prefers-color-scheme:dark)">
  <meta name="theme-color" content="#f0f0f8" media="(prefers-color-scheme:light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script>
    // Already signed in → app
    try { if (localStorage.getItem('ft_uid')) location.replace('./app.html'); } catch(e){}
    // Theme
    try {
      var t=localStorage.getItem('ft_theme');
      if(t?t!=='dark':!window.matchMedia('(prefers-color-scheme:dark)').matches)
        document.documentElement.classList.add('light');
    } catch(e){}
  </script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
  <style>
    /* Turnstile widget centering */
    .ts-wrap{display:flex;justify-content:center;margin:4px 0 14px;}
    .ts-wrap iframe{border-radius:8px!important;}
  
    :root{--bg:#06060f;--surface:#0d0d1f;--surface2:#131328;--surface3:#1a1a35;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--accent:#7c6bff;--accent2:#ff6b9d;--accent3:#00d4aa;--accent-dim:rgba(124,107,255,.13);--text:#eeeef8;--text2:#8a8ab5;--muted:#4a4a72;--red:#ff4d6d;}
    :root.light{--bg:#f0f0f8;--surface:#fff;--surface2:#e8e8f4;--surface3:#d8d8ee;--border:rgba(80,80,140,.09);--border2:rgba(80,80,140,.16);--accent:#6255e8;--accent2:#e8527a;--accent3:#00b894;--accent-dim:rgba(98,85,232,.12);--text:#18182e;--text2:#4e4e82;--muted:#8888b2;--red:#d63050;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased;}
    input{user-select:text;-webkit-user-select:text;}

    /* Blobs */
    .blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
    .blob1{width:600px;height:600px;top:-250px;left:-250px;background:radial-gradient(circle,rgba(124,107,255,.07),transparent 65%);}
    .blob2{width:500px;height:500px;bottom:-200px;right:-200px;background:radial-gradient(circle,rgba(255,107,157,.05),transparent 65%);}
    .blob3{width:300px;height:300px;top:45%;left:55%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,212,170,.03),transparent 65%);}

    /* Card */
    .card{position:relative;z-index:1;width:100%;max-width:380px;background:var(--surface);border:1.5px solid var(--border2);border-radius:24px;padding:32px 28px 28px;box-shadow:0 2px 0 rgba(255,255,255,.04),0 20px 60px rgba(0,0,0,.4);}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;}
    .logo{width:68px;height:68px;border-radius:22px;overflow:hidden;box-shadow:0 8px 28px rgba(124,107,255,.22);}
    .logo img{width:100%;height:100%;display:block;object-fit:cover;}
    .logo-fallback{width:68px;height:68px;border-radius:22px;background:linear-gradient(135deg,var(--accent),#5240e0);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;box-shadow:0 8px 28px rgba(124,107,255,.22);}
    .app-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-top:14px;}
    .app-sub{font-size:13px;color:var(--text2);margin-top:4px;}

    /* Tab row */
    .tab-row{display:flex;background:var(--surface2);border-radius:12px;padding:3px;margin-bottom:22px;}
    .tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;border-radius:9px;cursor:pointer;color:var(--text2);transition:all .2s;}
    .tab.active{background:var(--surface3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2);}

    /* Google button */
    .google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:14px;padding:13px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
    .google-btn:active{transform:scale(.98);background:var(--surface3);}
    .google-btn:disabled{opacity:.55;cursor:not-allowed;}
    .g-icon{width:18px;height:18px;flex-shrink:0;}

    /* Divider */
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

    /* Fields */
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
    .field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:rgba(124,107,255,.5);}
    .field input::placeholder{color:var(--muted);}
    .field input.err{border-color:rgba(255,77,109,.5);}

    /* Primary button */
    .primary-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 4px 18px rgba(124,107,255,.3);margin-top:4px;}
    .primary-btn:active{transform:scale(.98);}
    .primary-btn:disabled{opacity:.55;cursor:not-allowed;}

    /* Forgot / switch */
    .link-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
    .text-link{font-size:12px;color:var(--text2);cursor:pointer;text-decoration:underline;text-underline-offset:3px;background:none;border:none;font-family:'DM Sans',sans-serif;}
    .text-link:hover{color:var(--accent);}

    /* Error box */
    .err-box{background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.25);border-radius:11px;padding:10px 13px;font-size:12px;color:var(--red);line-height:1.55;margin-bottom:14px;white-space:pre-wrap;display:none;}
    .err-box.show{display:block;}

    /* Success box */
    .ok-box{background:rgba(0,212,170,.09);border:1px solid rgba(0,212,170,.25);border-radius:11px;padding:10px 13px;font-size:12px;color:var(--accent3);line-height:1.55;margin-bottom:14px;display:none;}
    .ok-box.show{display:block;}

    /* Spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .ring{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:6px;}
    .ring.dark{border-color:rgba(0,0,0,.15);border-top-color:var(--text2);}

    /* Reset password panel */
    #resetPanel{display:none;}

    /* Fade in */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card{animation:fadeUp .35s ease both;}
  
  </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo" id="logoWrap">
      <img src="icons/icon-512.png" alt="Fee Tracker"
        onerror="this.parentElement.outerHTML='<div class=\'logo-fallback\'>&#8377;</div>'">
    </div>
    <div class="app-name">Fee Tracker</div>
    <div class="app-sub">Track tuition fee payments</div>
  </div>

  <!-- Main sign-in / register panels -->
  <div id="mainPanel">
    <div class="tab-row">
      <div class="tab active" id="tabSignin" onclick="switchMode('signin')">Sign In</div>
      <div class="tab"        id="tabRegister" onclick="switchMode('register')">Register</div>
    </div>

    <div class="err-box" id="errBox"></div>
    <div class="ok-box"  id="okBox"></div>

    <!-- Google -->
    <button class="google-btn" id="googleBtn" onclick="doGoogle()">
      <svg class="g-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <!-- Email + password -->
    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInp" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')focusNext('passInp')"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passInp" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doEmail()"/>
    </div>
    <!-- Confirm password shown only on register -->
    <div class="field" id="confirmField" style="display:none;">
      <label>Confirm Password</label>
      <input type="password" id="confirmInp" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')doEmail()"/>
    </div>

    <!-- Cloudflare Turnstile — bot protection for email/password flow -->
    <div class="ts-wrap"><div id="tsWidget"></div></div>

    <button class="primary-btn" id="emailBtn" onclick="doEmail()">Sign In</button>

    <div class="link-row">
      <button class="text-link" id="forgotLink" onclick="showReset()">Forgot password?</button>
      <button class="text-link" id="switchLink" onclick="switchMode('register')">Create account</button>
    </div>
  </div>

  <!-- Password reset panel -->
  <div id="resetPanel">
    <div style="margin-bottom:18px;">
      <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;">Reset Password</div>
      <div style="font-size:13px;color:var(--text2);">We'll send a reset link to your email.</div>
    </div>
    <div class="err-box" id="resetErrBox"></div>
    <div class="ok-box"  id="resetOkBox"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="resetEmailInp" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')doReset()"/>
    </div>
    <button class="primary-btn" id="resetBtn" onclick="doReset()">Send Reset Link</button>
    <div style="margin-top:14px;text-align:center;">
      <button class="text-link" onclick="showMain()">← Back to sign in</button>
    </div>
  </div>
</div>

<script>
  function focusNext(id){ document.getElementById(id)?.focus(); }
  function showErr(id,msg){ var el=document.getElementById(id); el.textContent=msg; el.classList.toggle('show',!!msg); }
  function showOk(id,msg){ var el=document.getElementById(id); el.textContent=msg; el.classList.toggle('show',!!msg); }
  function clearMsgs(){ showErr('errBox',''); showOk('okBox',''); }

  var _mode='signin';
  function switchMode(m){
    _mode=m;
    clearMsgs();
    document.getElementById('tabSignin').classList.toggle('active',m==='signin');
    document.getElementById('tabRegister').classList.toggle('active',m==='register');
    document.getElementById('confirmField').style.display=m==='register'?'':'none';
    document.getElementById('emailBtn').textContent=m==='signin'?'Sign In':'Create Account';
    document.getElementById('forgotLink').style.display=m==='signin'?'':'none';
    document.getElementById('switchLink').textContent=m==='signin'?'Create account':'Already have an account?';
    document.getElementById('switchLink').onclick=function(){ switchMode(m==='signin'?'register':'signin'); };
    document.getElementById('passInp').setAttribute('autocomplete', m==='register'?'new-password':'current-password');
  }
  function showReset(){
    document.getElementById('mainPanel').style.display='none';
    document.getElementById('resetPanel').style.display='';
    var e=document.getElementById('emailInp').value;
    if(e) document.getElementById('resetEmailInp').value=e;
    document.getElementById('resetEmailInp').focus();
  }
  function showMain(){
    document.getElementById('resetPanel').style.display='none';
    document.getElementById('mainPanel').style.display='';
    showErr('resetErrBox',''); showOk('resetOkBox','');
  }
</script>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
import {
  getAuth, onAuthStateChanged,
  GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, browserLocalPersistence, setPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ── Turnstile ───────────────────────────────────────────────────────────── */
const TURNSTILE_SITE_KEY = '0x4AAAAAADiGfoToJrkcuTCv';
let _tsToken = null;
let _tsWidgetId = null;

function initTurnstile() {
  if (typeof turnstile === 'undefined') {
    // SDK not loaded yet — wait and retry
    setTimeout(initTurnstile, 300);
    return;
  }
  if (_tsWidgetId !== null) return;
  _tsWidgetId = turnstile.render('#tsWidget', {
    sitekey: TURNSTILE_SITE_KEY,
    theme: document.documentElement.classList.contains('light') ? 'light' : 'dark',
    callback: (token) => { _tsToken = token; },
    'expired-callback': () => { _tsToken = null; },
    'error-callback': () => { _tsToken = null; },
  });
}

// Wait for DOM + Turnstile SDK
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTurnstile);
} else {
  initTurnstile();
}

async function verifyTurnstile() {
  if (!_tsToken) return false;
  try {
    const res = await fetch('/api/verify-turnstile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: _tsToken }),
    });
    const data = await res.json();
    return data.success === true;
  } catch {
    return false; // network error — allow sign-in anyway (fail open)
  }
}

/* ── Init ─────────────────────────────────────────────────────────────────── */
let auth;
try {
  const res = await fetch('/api/config');
  if (!res.ok) throw new Error('Config ' + res.status);
  const cfg = await res.json();
  const app = initializeApp(cfg.firebase.primary);
  try { initializeAppCheck(app,{provider:new ReCaptchaV3Provider(cfg.recaptchaSiteKey),isTokenAutoRefreshEnabled:true}); } catch{}
  auth = getAuth(app);
  await setPersistence(auth, browserLocalPersistence).catch(()=>{});
} catch(e) {
  document.querySelector('.card').innerHTML =
    '<div style="text-align:center;padding:20px 0;">' +
    '<div style="font-size:15px;font-weight:700;color:var(--red);margin-bottom:8px;">Failed to load config</div>' +
    '<div style="font-size:13px;color:var(--muted);margin-bottom:18px)">Check your connection.</div>' +
    '<button onclick="location.reload()" style="padding:11px 28px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;">Retry</button>' +
    '</div>';
  throw e;
}

/* ── Where to go after sign-in ───────────────────────────────────────────── */
function redirect() {
  try {
    const dest = sessionStorage.getItem('ft_returnTo') || './app.html';
    sessionStorage.removeItem('ft_returnTo');
    location.replace(dest);
  } catch(e) { location.replace('./app.html'); }
}

/* ── Auth state: if already signed in → redirect immediately ─────────────── */
let _redirected = false;
onAuthStateChanged(auth, user => {
  if (user && !_redirected) {
    _redirected = true;
    try { localStorage.setItem('ft_uid', user.uid); localStorage.removeItem('ft_signed_out'); } catch{}
    redirect();
  }
});

/* ── Handle returning from signInWithRedirect ────────────────────────────── */
getRedirectResult(auth).catch(() => {});

/* ── Error messages ──────────────────────────────────────────────────────── */
function errMsg(code) {
  const m = {
    'auth/user-not-found':          'No account found for that email.',
    'auth/wrong-password':          'Incorrect password.',
    'auth/invalid-credential':      'Incorrect email or password.',
    'auth/email-already-in-use':    'An account already exists with this email.',
    'auth/weak-password':           'Password must be at least 6 characters.',
    'auth/invalid-email':           'Enter a valid email address.',
    'auth/too-many-requests':       'Too many attempts. Please wait and try again.',
    'auth/network-request-failed':  'Network error — check your connection.',
    'auth/unauthorized-domain':
      'Domain not authorised in Firebase.\n' +
      'Firebase Console → Authentication → Authorized domains → add: ' + location.hostname,
    'auth/operation-not-allowed':
      'This sign-in method is not enabled.\nFirebase Console → Authentication → Sign-in method.',
    'auth/popup-closed-by-user':    null,
    'auth/cancelled-popup-request': null,
    'auth/user-cancelled':          null,
  };
  return m[code] !== undefined ? m[code] : 'Error: ' + (code || 'unknown');
}

function setBusy(id, busy, label) {
  const el = document.getElementById(id);
  if (!el) return;
  el.disabled = busy;
  el.innerHTML = busy
    ? '<span class="ring"></span>' + label + '…'
    : label;
}

/* ── Google sign-in ──────────────────────────────────────────────────────── */
window.doGoogle = async function() {
  clearMsgs();
  setBusy('googleBtn', true, 'Continue with Google');
  document.getElementById('emailBtn').disabled = true;
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  try {
    if (isMobile) { await signInWithRedirect(auth, provider); return; }
    await signInWithPopup(auth, provider);
  } catch(e) {
    if (['auth/popup-blocked','auth/popup-closed-by-user','auth/cancelled-popup-request'].includes(e.code)) {
      try { await signInWithRedirect(auth, provider); return; } catch{}
    }
    const msg = errMsg(e.code);
    if (msg) showErr('errBox', msg);
    setBusy('googleBtn', false, 'Continue with Google');
    document.getElementById('emailBtn').disabled = false;
  }
};

/* ── Email / password ────────────────────────────────────────────────────── */
window.doEmail = async function() {
  clearMsgs();
  const email   = document.getElementById('emailInp').value.trim();
  const pass    = document.getElementById('passInp').value;
  const confirm = document.getElementById('confirmInp').value;
  if (!email) { showErr('errBox', 'Enter your email address.'); document.getElementById('emailInp').focus(); return; }
  if (!pass)  { showErr('errBox', 'Enter your password.'); document.getElementById('passInp').focus(); return; }
  if (_mode === 'register') {
    if (pass.length < 6) { showErr('errBox', 'Password must be at least 6 characters.'); return; }
    if (pass !== confirm) { showErr('errBox', 'Passwords do not match.'); document.getElementById('confirmInp').focus(); return; }
  }

  // ── Turnstile verification ─────────────────────────────────────────────
  if (!_tsToken) {
    showErr('errBox', 'Please complete the security check above.');
    return;
  }
  setBusy('emailBtn', true, _mode === 'signin' ? 'Sign In' : 'Create Account');
  document.getElementById('googleBtn').disabled = true;
  const tsOk = await verifyTurnstile();
  if (!tsOk) {
    showErr('errBox', 'Security check failed. Please refresh and try again.');
    setBusy('emailBtn', false, _mode === 'signin' ? 'Sign In' : 'Create Account');
    document.getElementById('googleBtn').disabled = false;
    if (typeof turnstile !== 'undefined' && _tsWidgetId !== null) turnstile.reset(_tsWidgetId);
    _tsToken = null;
    return;
  }

  try {
    if (_mode === 'signin') {
      await signInWithEmailAndPassword(auth, email, pass);
    } else {
      await createUserWithEmailAndPassword(auth, email, pass);
    }
    // onAuthStateChanged fires → redirects
  } catch(e) {
    const msg = errMsg(e.code);
    if (msg) showErr('errBox', msg); else toast('Sign-in failed: ' + e.code, 'error');
    setBusy('emailBtn', false, _mode === 'signin' ? 'Sign In' : 'Create Account');
    document.getElementById('googleBtn').disabled = false;
    if (typeof turnstile !== 'undefined' && _tsWidgetId !== null) turnstile.reset(_tsWidgetId);
    _tsToken = null;
  }
};

/* ── Password reset ──────────────────────────────────────────────────────── */
window.doReset = async function() {
  showErr('resetErrBox',''); showOk('resetOkBox','');
  const email = document.getElementById('resetEmailInp').value.trim();
  if (!email) { showErr('resetErrBox', 'Enter your email address.'); return; }
  setBusy('resetBtn', true, 'Send Reset Link');
  try {
    await sendPasswordResetEmail(auth, email);
    showOk('resetOkBox', 'Reset link sent! Check your inbox.');
  } catch(e) {
    const code = e.code;
    if (code === 'auth/user-not-found') showOk('resetOkBox', 'If that email exists, a reset link has been sent.');
    else showErr('resetErrBox', errMsg(code) || 'Failed to send reset email.');
  } finally {
    setBusy('resetBtn', false, 'Send Reset Link');
  }
};
</script>
</body>
</html>
