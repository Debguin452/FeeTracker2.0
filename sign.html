<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Sign In — Fee Tracker</title>
  <meta name="description" content="Sign in to Fee Tracker to track tuition fee payments, manage student batches, and stay on top of dues.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://feetracker2.pages.dev/sign">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080812" media="(prefers-color-scheme:dark)">
  <meta name="theme-color" content="#f0f0f8" media="(prefers-color-scheme:light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script>
    try {
      if (sessionStorage.getItem('ft_bounce') === '1') {
        sessionStorage.removeItem('ft_bounce');
        localStorage.removeItem('ft_uid');
        window._ft_show_expired = true;
      } else if (localStorage.getItem('ft_uid')) {
        location.replace('./app');
      }
    } catch(e) {}
    try {
      var _t = localStorage.getItem('ft_theme');
      if (_t ? _t !== 'dark' : !window.matchMedia('(prefers-color-scheme:dark)').matches)
        document.documentElement.classList.add('light');
    } catch(e) {}
  </script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080812;
      --surface: #0f0f1e;
      --border:  rgba(255,255,255,.08);
      --text:    #ebebf5;
      --text2:   #8e8eb8;
      --accent:  #7c6bff;
      --accent2: rgba(124,107,255,.12);
      --red:     #ff4d6d;
      --green:   #00d4aa;
      --input-bg: rgba(255,255,255,.04);
      --input-border: rgba(255,255,255,.1);
      --input-focus:  rgba(124,107,255,.5);
    }
    :root.light {
      --bg:      #f0f0f8;
      --surface: #ffffff;
      --border:  rgba(0,0,0,.08);
      --text:    #18182e;
      --text2:   #5a5a8a;
      --input-bg: rgba(0,0,0,.03);
      --input-border: rgba(0,0,0,.12);
      --input-focus:  rgba(124,107,255,.4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body { display: flex; align-items: center; justify-content: center; padding: 16px; min-height: 100%; }
    .card {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }
    .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-icon {
      width: 68px; height: 68px; border-radius: 22px;
      overflow: hidden; box-shadow: 0 8px 28px rgba(124,107,255,.22);
    }
    .logo-icon img { width: 100%; height: 100%; display: block; object-fit: cover; }
    .logo-fallback {
      width: 68px; height: 68px; border-radius: 22px;
      background: linear-gradient(135deg, #7c6bff, #5240e0);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
      color: #fff; box-shadow: 0 8px 28px rgba(124,107,255,.22);
    }
    .logo-icon svg { width: 32px; height: 32px; }
    .logo-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
    .logo-sub { font-size: 13px; color: var(--text2); }
    .tab-row { display: flex; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 12px; padding: 3px; margin-bottom: 22px; }
    .tab-btn { flex: 1; padding: 9px; border: none; background: none; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(124,107,255,.4); }
    .google-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px; border-radius: 13px; border: 1px solid var(--input-border);
      background: var(--input-bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; margin-bottom: 16px;
    }
    .google-btn:hover { border-color: var(--accent); background: var(--accent2); }
    .google-btn:disabled { opacity: .5; cursor: not-allowed; }
    .google-btn:disabled .g-icon { display: none; }
    .google-btn:disabled::before {
      content: ''; display: inline-block; width: 16px; height: 16px; margin-right: 2px;
      border: 2px solid var(--input-border); border-top-color: var(--text2);
      border-radius: 50%; animation: spin .65s linear infinite; vertical-align: -3px;
    }
    .divider { display: flex; align-items: center; gap: 12px; color: var(--text2); font-size: 12px; margin-bottom: 16px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .field-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
    .field { margin-bottom: 14px; }
    .input {
      width: 100%; padding: 13px 14px; border-radius: 12px;
      border: 1px solid var(--input-border); background: var(--input-bg);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; transition: border-color .15s;
    }
    .input:focus { border-color: var(--input-focus); }
    .input::placeholder { color: var(--text2); opacity: .6; }
    .ts-wrap { margin-bottom: 14px; min-height: 65px; border-radius: 8px; overflow: hidden; }
    .ts-wrap:empty {
      background: linear-gradient(90deg, var(--input-bg) 25%, var(--input-border) 50%, var(--input-bg) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s ease-in-out infinite;
    }
    .primary-btn {
      width: 100%; padding: 14px; border-radius: 13px; border: none;
      background: var(--accent); color: #fff; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s;
      box-shadow: 0 4px 18px rgba(124,107,255,.3); margin-top: 4px; margin-bottom: 16px;
    }
    .primary-btn:active { transform: scale(.98); }
    .primary-btn:disabled { opacity: .6; cursor: not-allowed; }
    .primary-btn:disabled::before {
      content: ''; display: inline-block; width: 14px; height: 14px; margin-right: 8px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .65s linear infinite; vertical-align: -2px;
    }
    .footer-row { display: flex; justify-content: space-between; align-items: center; }
    .text-link { background: none; border: none; color: var(--text2); font-size: 13px; cursor: pointer; padding: 4px 0; text-decoration: underline; text-underline-offset: 3px; }
    .text-link:hover { color: var(--text); }
    .err-box {
      background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.3);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #ff4d6d;
      margin-bottom: 14px; display: none; white-space: pre-line; line-height: 1.5;
    }
    .ok-box {
      background: rgba(0,212,170,.1); border: 1px solid rgba(0,212,170,.3);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #00d4aa;
      margin-bottom: 14px; display: none;
    }
    .reset-panel { display: none; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1c1c38; color: #ebebf5; padding: 12px 20px; border-radius: 12px;
      font-size: 13px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transition: transform .25s, opacity .25s; opacity: 0; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: rgba(255,77,109,.9); }
    .toast.success { background: rgba(0,212,170,.9); color: #fff; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @media (max-height: 700px) { .card { padding: 24px 20px 20px; } .logo-wrap { margin-bottom: 20px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon" id="logoWrap">
        <img src="icons/icon-512.png" alt="Fee Tracker"
          onerror="this.parentElement.outerHTML='<div class=\'logo-fallback\'>&#8377;</div>'">
      </div>
      <div class="logo-title">Fee Tracker</div>
      <div class="logo-sub">Track tuition fee payments</div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" id="tabSignin" onclick="setMode('signin')">Sign In</button>
      <button class="tab-btn" id="tabRegister" onclick="setMode('register')">Register</button>
    </div>

    <button class="google-btn" id="googleBtn" onclick="doGoogle()">
      <svg class="g-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="18" height="18">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <div id="errBox" class="err-box"></div>
    <div id="okBox" class="ok-box"></div>

    <div class="field">
      <div class="field-label">Email</div>
      <input class="input" id="emailInp" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email"/>
    </div>
    <div class="field" id="passField">
      <div class="field-label">Password</div>
      <input class="input" id="passInp" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="field" id="pass2Field" style="display:none">
      <div class="field-label">Confirm Password</div>
      <input class="input" id="pass2Inp" type="password" placeholder="••••••••" autocomplete="new-password"/>
    </div>

    <div class="ts-wrap" id="tsWidget"></div>

    <button class="primary-btn" id="emailBtn" onclick="doEmail()">Sign In</button>

    <div class="footer-row">
      <button class="text-link" id="forgotBtn" onclick="showReset()">Forgot password?</button>
      <button class="text-link" onclick="setMode(_mode === 'signin' ? 'register' : 'signin')" id="switchBtn">Create account</button>
    </div>

    <div class="reset-panel" id="resetPanel">
      <div class="field" style="margin-top:16px">
        <div class="field-label">Email to reset password</div>
        <input class="input" id="resetEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <button class="primary-btn" id="resetBtn" onclick="doReset()">Send Reset Link</button>
      <div style="text-align:center">
        <button class="text-link" onclick="hideReset()">Back to sign in</button>
      </div>
    </div>
  </div>

  <div class="toast" id="_toast"></div>

  <script type="module">
    import { initializeApp }      from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
             getRedirectResult, signInWithEmailAndPassword, createUserWithEmailAndPassword,
             sendPasswordResetEmail, browserLocalPersistence, setPersistence,
             onAuthStateChanged }  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    let _mode = 'signin', _tsToken = null, _tsWidgetId = null, _toastTid = null;
    let _redirectHandled = false;
    let auth;

    function toast(msg, type) {
      const el = document.getElementById('_toast');
      if (_toastTid) { clearTimeout(_toastTid); el.className = 'toast'; void el.offsetWidth; }
      el.textContent = msg;
      el.className = 'toast show' + (type ? ' ' + type : '');
      _toastTid = setTimeout(() => { el.className = 'toast'; _toastTid = null; }, 3500);
    }

    if (window._ft_show_expired) toast('Session expired — please sign in again.', 'error');

    function showErr(msg) {
      const el = document.getElementById('errBox');
      el.textContent = msg; el.style.display = msg ? '' : 'none';
      document.getElementById('okBox').style.display = 'none';
    }
    function showOk(msg) {
      const el = document.getElementById('okBox');
      el.textContent = msg; el.style.display = msg ? '' : 'none';
      document.getElementById('errBox').style.display = 'none';
    }
    function clearMsgs() { showErr(''); showOk(''); }

    function setBusy(id, busy, label) {
      const btn = document.getElementById(id);
      btn.disabled = busy;
      if (!busy) btn.textContent = label;
    }

    function lockAll() {
      document.getElementById('googleBtn').disabled = true;
      document.getElementById('emailBtn').disabled  = true;
    }
    function unlockAll() {
      document.getElementById('googleBtn').disabled = false;
      document.getElementById('emailBtn').disabled  = false;
    }

    window.setMode = function(m) {
      _mode = m;
      document.getElementById('tabSignin').classList.toggle('active', m === 'signin');
      document.getElementById('tabRegister').classList.toggle('active', m === 'register');
      document.getElementById('pass2Field').style.display = m === 'register' ? '' : 'none';
      document.getElementById('emailBtn').textContent = m === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('switchBtn').textContent = m === 'signin' ? 'Create account' : 'Back to sign in';
      document.getElementById('forgotBtn').style.display = m === 'signin' ? '' : 'none';
      clearMsgs();
      hideReset();
    };

    window.showReset = function() {
      document.getElementById('resetPanel').style.display = '';
      document.getElementById('forgotBtn').style.display = 'none';
    };
    window.hideReset = function() {
      document.getElementById('resetPanel').style.display = 'none';
      document.getElementById('forgotBtn').style.display = _mode === 'signin' ? '' : 'none';
    };

    function initTurnstile() {
      if (typeof turnstile === 'undefined') { setTimeout(initTurnstile, 300); return; }
      _tsWidgetId = turnstile.render('#tsWidget', {
        sitekey: '0x4AAAAAADiGfoToJrkcuTCv',
        callback: t => { _tsToken = t; },
        'expired-callback': () => { _tsToken = null; },
        'error-callback':   () => { _tsToken = null; },
        theme: document.documentElement.classList.contains('light') ? 'light' : 'dark',
      });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initTurnstile);
    else initTurnstile();

    async function verifyTs() {
      if (!_tsToken) { showErr('Please complete the security check.'); return false; }
      try {
        const r = await fetch('/api/verify-turnstile', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: _tsToken }),
        });
        const d = await r.json();
        return d.success === true;
      } catch { return false; }
    }

    function resetTs() {
      _tsToken = null;
      if (typeof turnstile !== 'undefined' && _tsWidgetId !== null) turnstile.reset(_tsWidgetId);
    }

    function errMsg(code) {
      return ({
        'auth/user-not-found':         'No account found for that email.',
        'auth/wrong-password':         'Incorrect password.',
        'auth/invalid-credential':     'Incorrect email or password.',
        'auth/email-already-in-use':   'An account already exists with this email.',
        'auth/weak-password':          'Password must be at least 6 characters.',
        'auth/invalid-email':          'Enter a valid email address.',
        'auth/too-many-requests':      'Too many attempts — please wait and try again.',
        'auth/network-request-failed': 'Network error — check your connection.',
        'auth/popup-closed-by-user':   '',
        'auth/cancelled-popup-request':'',
        'auth/user-cancelled':         '',
      })[code] ?? ('Sign-in error: ' + (code || 'unknown'));
    }

    function goApp() {
      const dest = sessionStorage.getItem('ft_returnTo') || './app';
      sessionStorage.removeItem('ft_returnTo');
      try { location.replace(dest); } catch { location.replace('./app'); }
    }

    async function boot() {
      let cfg;
      try {
        const res = await fetch('/api/config');
        cfg = await res.json();
      } catch {
        showErr('Cannot reach server — check your connection.'); unlockAll(); return;
      }

      const app = initializeApp(cfg.firebase.primary);
      auth = getAuth(app);
      await setPersistence(auth, browserLocalPersistence).catch(() => {});

      try {
        const result = await getRedirectResult(auth);
        if (result?.user) {
          _redirectHandled = true;
          try { localStorage.setItem('ft_uid', result.user.uid); } catch {}
          goApp();
          return;
        }
      } catch(e) {
        const msg = errMsg(e.code);
        if (msg) showErr(msg);
        resetTs();
      }

      onAuthStateChanged(auth, user => {
        if (user && !_redirectHandled) {
          _redirectHandled = true;
          try { localStorage.setItem('ft_uid', user.uid); localStorage.removeItem('ft_signed_out'); } catch {}
          goApp();
        } else if (!user && !_redirectHandled) {
          unlockAll();
        }
      });
    }

    boot();

    window.doGoogle = async function() {
      clearMsgs();
      if (!_tsToken) { showErr('Please complete the security check first.'); return; }
      lockAll();
      const ok = await verifyTs();
      if (!ok) { showErr('Security check failed — please try again.'); resetTs(); unlockAll(); return; }
      const provider = new GoogleAuthProvider();
      provider.addScope('profile');
      provider.addScope('email');
      const isMobile = /Mobi|Android/i.test(navigator.userAgent);
      try {
        if (isMobile) {
          await signInWithRedirect(auth, provider);
        } else {
          const result = await signInWithPopup(auth, provider);
          if (result?.user) {
            _redirectHandled = true;
            try { localStorage.setItem('ft_uid', result.user.uid); } catch {}
            goApp();
          }
        }
      } catch(e) {
        const msg = errMsg(e.code);
        if (msg) showErr(msg);
        resetTs(); unlockAll();
      }
    };

    window.doEmail = async function() {
      clearMsgs();
      const email = document.getElementById('emailInp').value.trim();
      const pass  = document.getElementById('passInp').value;
      if (!email) { showErr('Enter your email.'); return; }
      if (!pass)  { showErr('Enter your password.'); return; }
      if (_mode === 'register') {
        const pass2 = document.getElementById('pass2Inp').value;
        if (pass !== pass2) { showErr('Passwords do not match.'); return; }
        if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
      }
      if (!_tsToken) { showErr('Please complete the security check first.'); return; }
      lockAll();
      const ok = await verifyTs();
      if (!ok) { showErr('Security check failed — please try again.'); resetTs(); unlockAll(); return; }
      try {
        const cred = _mode === 'signin'
          ? await signInWithEmailAndPassword(auth, email, pass)
          : await createUserWithEmailAndPassword(auth, email, pass);
        _redirectHandled = true;
        try { localStorage.setItem('ft_uid', cred.user.uid); } catch {}
        goApp();
      } catch(e) {
        const msg = errMsg(e.code);
        if (msg) showErr(msg);
        resetTs(); unlockAll();
      }
    };

    window.doReset = async function() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { toast('Enter your email first.', 'error'); return; }
      setBusy('resetBtn', true, 'Send Reset Link');
      try {
        await sendPasswordResetEmail(auth, email, { url: location.origin + '/sign' });
        showOk('Reset link sent — check your inbox.');
        hideReset();
        toast('Reset email sent!', 'success');
      } catch(e) {
        const msg = errMsg(e.code);
        toast(msg || 'Could not send reset email.', 'error');
      }
      setBusy('resetBtn', false, 'Send Reset Link');
    };

    document.getElementById('emailInp').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('passInp').focus(); }
    });
    document.getElementById('passInp').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); window.doEmail(); }
    });
    document.getElementById('pass2Inp').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); window.doEmail(); }
    });
    document.getElementById('resetEmail').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); window.doReset(); }
    });
  </script>
</body>
</html>
